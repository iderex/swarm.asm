# Dependabot — weekly maintenance for the GitHub Actions SHA pins and the
# test-harness NuGet packages.

version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: nuget
    directory: "/tests/Swarm.Tests"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      nuget-minor-and-patch:
        update-types:
          - minor
          - patch
